<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MentatEngine | Psicodelia</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            /* El fondo base con los colores de tu imagen */
            background: linear-gradient(45deg, #f39c12, #e91e63, #9b59b6, #3498db, #2ecc71);
            background-size: 400% 400%;
            animation: flow 10s ease infinite;
        }

        /* Animación que mueve los colores como lava */
        @keyframes flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efecto de distorsión para imitar las ondas de la imagen */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotate(30deg);
            filter: blur(1px);
            z-index: 1;
        }

        img {
            position: relative;
            z-index: 2;
            width: 80vw;
            max-width: 1200px;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.4));
            /* Un ligero balanceo para el logo */
            animation: float 4s ease-in-out infinite;
        }

        .docs-button {
            position: relative;
            z-index: 2;
            display: inline-block;
            margin: 12px 10px 0 10px;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
            box-shadow: 0 0 20px rgba(0,0,0,0.25);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .docs-button:hover {
            transform: scale(1.05);
            background: rgba(0,0,0,0.5);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
        }
    </style>
</head>
<body>
    <div style="position: relative; z-index: 2; text-align: center;">
        <img src="title.svg" alt="Logo MentatEngine">
        <br>
        <a class="docs-button" href="docs/api/index.html">Full documentation</a>
        <a class="docs-button" href="getting-started.html">Getting Started</a>
    </div>
</body>
</html>
