<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentación | Mi Proyecto</title>
    <style>
        :root {
            --primary-color: #2f363d;
            --bg-color: #f6f8fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--primary-color);
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 600px;
        }
        .logo-container {
            margin-bottom: 20px;
        }
        img.main-logo {
            width: 2000px; /* Ajusta el tamaño de tu SVG aquí */
            height: auto;
        }
        h1 {
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            background-color: #28a745;
            color: white;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <!-- Aquí cargamos tu archivo title.svg -->
            <img src="title.svg" alt="Logo de Documentación" class="main-logo">
        </div>
        
        <h1>Documentación del Proyecto</h1>
        <p>Bienvenido a la página oficial de documentación alojada en GitHub Pages.</p>
        
        <div class="status-badge">Online</div>
        
        <hr>
        <p><small>Editado desde el repositorio local</small></p>
    </div>

</body>
</html>
